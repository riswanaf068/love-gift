<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=neon|outline|emboss|shadow-multiple">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
</head>
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    
}
body{
    margin:0;
    min-height:100vh;

    background:#222;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    padding:20px;
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{ 
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

#setUp{

    position:relative;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    width:90%;
    max-width:550px;

    background:#F2D7D5;

    border-radius:15px;

    padding:25px;

    text-align:center;

    z-index:10;
}
img,h2,h3,button{
    margin:10px;
}
h3{

    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    color:#e23c3c;

    text-align:center;

    line-height:1.5;
}
button{

    padding:12px 20px;

    width:170px;

    font-size:16px;

    border:none;

    border-radius:8px;

    background:#e23c3c;

    color:white;

    cursor:pointer;
}
.image{

    width:200px;

    max-width:70%;

    height:auto;
}
h1{

    font-size:2rem;

    line-height:1.3;
}
@media(max-width:768px){

    #setUp{

        width:95%;

        padding:20px;
    }

    .image{

        width:150px;
    }

    h1{

        font-size:1.6rem;
    }

    h3{

        font-size:1rem;
    }

    button{

        width:150px;

        font-size:15px;
    }

}
@media(max-width:480px){

    .image{

        width:120px;
    }

    h1{

        font-size:1.3rem;
    }

    h3{

        font-size:0.9rem;
    }

    button{

        width:130px;

        padding:10px;
    }

}
</style>
<body>
    <div id="setUp">
    <img src="./pictures/Accept.jpg"
class="image">
    <h1>  Yaaaaaaah! Thank You for Accepting Me🥰</h1>
    <h3>I want to Remember some special date with your cutest Photo😍</h3>
    <button id="button">Click Me</button>
    </div>
</body>
<script>
const colors = ["red","yellow","blue","green","pink","orange","purple"];

for(let i=0; i<100; i++){
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.backgroundColor =
        colors[Math.floor(Math.random()*colors.length)];

    confetti.style.animationDuration =
        (Math.random()*3 + 2) + "s"; 

    confetti.style.opacity = Math.random();

    document.body.appendChild(confetti);
}
let button=document.getElementById("button")
button.addEventListener("click",()=>{
    window.location.href='Photo.html'
})
</script>
</html>
