<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<audio id="music" controls autoplay>
    <source src="./pictures/Paathi-Kadhal-MassTamilan.io.mp3" type="audio/mpeg">
</audio>
<style>
    *{
        margin:0px;
        padding:0px;
        box-sizing:border-box;

    }
   body{
    background-color:#D3D3FF;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    padding:20px;
}
.photo-frame{

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    width:90%;
    max-width:500px;

    padding:20px;

    background:white;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.2);

    text-align:center;

    position:relative;

    z-index:10;
}
      div{
       display: flex;
       flex-direction: column;
       justify-content: center;
       align-items: center;
       position: relative;
       
       
       
    }
    img{

    width:100%;

    max-width:250px;

    aspect-ratio:9/16;

    object-fit:cover;

    border-radius:10px;

    margin-bottom:20px;
}
.next-btn{

    padding:12px 25px;

    font-size:18px;

    border:none;

    border-radius:8px;

    background:#ff5f7a;

    color:white;

    cursor:pointer;
}
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear infinite;
}

img{
    margin-bottom: 20px;
}
h2{

    font-size:1.6rem;

    line-height:1.4;

    text-align:center;

    margin-bottom:15px;
}


@keyframes fall{
    from{ 
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@keyframes effect{
    0%{
      
        opacity:0 ;
    }
    
 
    100%{
       opacity:1  ;
    }
    
}
@media (max-width:768px){

    .photo-frame{

        width:95%;

        padding:15px;
    }

    img{

        max-width:220px;
    }

    h2{

        font-size:1.3rem;
    }

    .next-btn{

        font-size:16px;

        padding:10px 20px;
    }

}
@media (max-width:480px){

    img{

        max-width:180px;
    }

    h2{

        font-size:1.1rem;
    }

    .next-btn{

        width:150px;

        font-size:15px;
    }

}
</style>
<body>
  <audio id="music" src="./pictures/Paathi-Kadhal-MassTamilan.io.mp3" autoplay></audio>
<div class="photo-frame">
    <img id="slide" src="./pictures/24_oct.jpeg" alt="Photo">
     <h2 id="text">I Saw ON October 24th</h2>
</div>
</body>
<script>

let music = document.getElementById("music");

music.play();
let images=["./pictures/24_oct.jpeg","./pictures/nov9.jpeg","./pictures/firstconversationnov28.jpeg","./pictures/dec_7engagement.jpeg","./pictures/dec_23trustphoto.jpeg","./pictures/may_1firstmeet.jpeg","./pictures/27_maysecondgift.jpeg","./pictures/finaltouch.jpeg"];
let index=1;
let texts=["I Saw ON October 24th","Our first Meet On Nov 9","First Conversation On Nov 28","Engagement held on Dec 7","U get Trust And send Photo on Dec 23","First Day Outside Meet Gift On May 1","Second Meet gift","Finally Touch on May 27"]
let slide=document.getElementById("slide");
let text= document.getElementById("text")
let photo_frame=document.querySelector(".photo-frame");
const colors = ["red","yellow","blue","green","pink","orange","purple"];
for(let i=0; i<100; i++){
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.backgroundColor =
        colors[Math.floor(Math.random()*colors.length)];

    confetti.style.animationDuration =
        (Math.random()*3 + 2) + "s"; 

    confetti.style.opacity = Math.random();

    document.body.appendChild(confetti);
}

let timer=setInterval(()=>{

     if(index<images.length){
       slide.src=images[index];
       text.innerText=texts[index];
       index++;
       slide.style.animation = "none";

// Force the browser to apply the removal
slide.offsetHeight;

// Add animation again
slide.style.animation = "effect 8s";
    }
    if(index==images.length){
        
        clearInterval(timer);
        
        let button=document.createElement("button")
        button.innerText="next"
        photo_frame.append(button)
        button.classList.add("next-btn")
        button.addEventListener("click",()=>{
            window.location.href='Type.html'
        })
    }

},2000)






</script>
</html>
